name = "hono-ecommerce"
main = "src/index.ts"
compatibility_date = "2025-02-20"
compatibility_flags = ["nodejs_compat"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

# ── Development environment ─────────────────────────────────
# Deployed via: wrangler deploy --env development
# Worker name:  hono-ecommerce-development
[env.development]
name = "hono-ecommerce-development"
[env.development.vars]
ENVIRONMENT = "development"

# ── Production environment ──────────────────────────────────
# Deployed via: wrangler deploy --env production
# Worker name:  hono-ecommerce-production
[env.production]
name = "hono-ecommerce-production"
[env.production.vars]
ENVIRONMENT = "production"
