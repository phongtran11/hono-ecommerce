info:
  name: Update Cart Item
  type: http
  seq: 7

http:
  method: put
  url: "{{base_url}}/api/cart/:itemId"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "quantity": 2
      }
  auth: inherit

vars:
  preRequest:
    - name: itemId
      value: "item-uuid"

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
