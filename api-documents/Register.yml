info:
  name: Register
  type: http
  seq: 1

http:
  method: post
  url: http://localhost:8787/api/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "password": "secret123",
        "name": "Test User"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
